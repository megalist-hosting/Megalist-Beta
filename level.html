<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global TSL</title>
    <link rel="stylesheet" href="css/level.css">
     <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-content" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto;">
            <div class="logo">MEGA<span> LIST</span></div>
            <li><a href="index.html" style="text-decoration: none; color: inherit;">List</a></li>
            <li><button id="theme-btn" class="theme-toggle">🌙 Dark</button></li>
        </div>
    </header>

    <main class="level-detail-container" id="level-detail-view">
        <p style="text-align: center; padding: 50px;">Carregando informações do nível...</p>
    </main>

    <script src="js/data.js"></script>
    <script src="js/level.js"></script>
    <script src="darkmode.js"></script>
    
    <script>
        const toggleBtn = document.getElementById('dark-mode-toggle');
        const body = document.body;

        // Verifica se o usuário já tinha preferência salva
        if (localStorage.getItem('dark-mode') === 'enabled') {
            body.classList.add('dark-mode');
            toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('dark-mode', 'enabled');
                toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                localStorage.setItem('dark-mode', 'disabled');
                toggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        });
    </script>
</body>
</html>
